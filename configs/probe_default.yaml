# Hidden-state probing experiment defaults
seed: 42

model:
  name: Qwen/Qwen2-1.5B-Instruct
  revision: main

dataset:
  id: mandarjoshi/trivia_qa
  config: rc.nocontext
  split: validation
  revision: main
  num_samples: 500

generation:
  max_new_tokens: 24
  prompt_template: "Answer the following question in a few words.\nQuestion: {question}\nAnswer:"

probe:
  n_splits: 10
  test_size: 0.2
  val_size: 0.2
  n_permutations: 50
  bootstrap_samples: 2000
  audit_sample_size: 25

output:
  results_dir: results
  assets_dir: assets
